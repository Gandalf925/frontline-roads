name: Sync index release marker

on:
  push:
    paths:
      - '.github/workflows/sync-index-release-marker.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync index.html release marker
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = "version: '0.38.79'"
          new = "version: '0.38.83'"
          if old not in text and new not in text:
              raise SystemExit('expected release marker was not found')
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          Path('.github/workflows/sync-index-release-marker.yml').unlink(missing_ok=True)
          PY
      - name: Commit synced marker
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git add index.html .github/workflows/sync-index-release-marker.yml
          git commit -m "Sync HTML release marker to 0.38.83"
          git push
